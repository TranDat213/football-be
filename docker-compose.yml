version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: football-backend
    ports:
      - "3000:3000" # Map host port to container port (adjust if necessary)
    env_file:
      - .env
    restart: unless-stopped
    # If you have a database, you can add it here as well and link it
    # depends_on:
    #   - db
